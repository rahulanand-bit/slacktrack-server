services:
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: sh -c "npm install && npm run prisma:generate && npm run dev"
    ports:
      - "8080:8080"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../:/app
      - /app/node_modules

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    command: sh -c "npm install && npm run prisma:generate && npm run worker:dev"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
    volumes:
      - ../../:/app
      - /app/node_modules

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: slacktrack
      POSTGRES_USER: slacktrack
      POSTGRES_PASSWORD: slacktrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
